// ── Firebase helpers ──
function fbSave(path, data) {
  if (!db) { localStorage.setItem("mog_"+path, JSON.stringify(data)); return; }
  db.ref(path).set(data);
}
function fbListen(path, callback) {
  if (!db) {
    try { const d=JSON.parse(localStorage.getItem("mog_"+path)); callback(d); } catch{ callback(null); }
    return ()=>{};
  }
  const ref = db.ref(path);
  ref.on("value", snap => callback(snap.val()));
  return () => ref.off("value");
}

// ── Date helpers ──
function dk(y,m,d){return`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
function parseDk(s){const p=s.split("-");return{y:+p[0],m:+p[1]-1,d:+p[2]};}
function todayKey(){const t=new Date();return dk(t.getFullYear(),t.getMonth(),t.getDate());}
function getDIM(y,m){return new Date(y,m+1,0).getDate();}
function getFDow(y,m){return new Date(y,m,1).getDay();}
function getDow(s){const{y,m,d}=parseDk(s);return new Date(y,m,d).getDay();}
function dateLabel(s){const{m,d}=parseDk(s);return`${m+1}/${d}`;}
function dateLabelFull(s){return`${dateLabel(s)}(${DAYS_JP[getDow(s)]})`;}
function prevDay(s){const{y,m,d}=parseDk(s);const p=new Date(y,m,d-1);return dk(p.getFullYear(),p.getMonth(),p.getDate());}
function getWeekRange(ds){
  const{y,m,d}=parseDk(ds);const date=new Date(y,m,d);const dow=date.getDay();const diff=dow===0?-6:1-dow;
  const mon=new Date(y,m,d+diff);const sun=new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+6);
  return{start:dk(mon.getFullYear(),mon.getMonth(),mon.getDate()),end:dk(sun.getFullYear(),sun.getMonth(),sun.getDate())};
}
function datesInRange(s,e){
  const dates=[];const{y,m,d}=parseDk(s);let cur=new Date(y,m,d);
  const{y:ey,m:em,d:ed}=parseDk(e);const end=new Date(ey,em,ed);
  while(cur<=end){dates.push(dk(cur.getFullYear(),cur.getMonth(),cur.getDate()));cur=new Date(cur.getFullYear(),cur.getMonth(),cur.getDate()+1);}
  return dates;
}
function calcMonthAge(birthday){if(!birthday)return null;const b=new Date(birthday);const now=new Date();let mo=(now.getFullYear()-b.getFullYear())*12+(now.getMonth()-b.getMonth());if(now.getDate()<b.getDate())mo--;return Math.max(0,mo);}
function getStageLabel(mo){if(mo===null)return"";if(mo<5)return"離乳食前";if(mo<=6)return"初期（ゴックン期）";if(mo<=8)return"中期（モグモグ期）";if(mo<=11)return"後期（カミカミ期）";if(mo<=18)return"完了期（パクパク期）";return"離乳食完了";}

function foodEmoji(f){
  if(f.includes("がゆ"))return"🍚";if(f.includes("にんじん"))return"🥕";if(f.includes("かぼちゃ"))return"🎃";
  if(f.includes("ほうれん草")||f.includes("小松菜")||f.includes("ブロッコリー")||f.includes("キャベツ")||f.includes("白菜"))return"🥬";
  if(f.includes("トマト"))return"🍅";if(f.includes("さつまいも")||f.includes("じゃがいも"))return"🥔";
  if(f.includes("大根")||f.includes("かぶ")||f.includes("玉ねぎ"))return"🧅";
  if(f.includes("りんご"))return"🍎";if(f.includes("バナナ"))return"🍌";if(f.includes("みかん"))return"🍊";
  if(f.includes("いちご"))return"🍓";if(f.includes("もも"))return"🍑";
  if(f.includes("豆腐")||f.includes("きな粉"))return"🫘";if(f.includes("しらす")||f.includes("魚"))return"🐟";
  if(f.includes("だし")||f.includes("スープ"))return"🍲";return"🥄";
}
function getCat(food){for(const[c,list]of Object.entries(STAGE_FOODS)){if(list.includes(food))return c;}return"その他";}

function MonthNav({year,month,onPrev,onNext}){
  return(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 8px",marginBottom:4}}>
    <button onClick={onPrev} style={navBtn}>◀</button>
    <span style={{fontFamily:font,fontWeight:700,fontSize:18,color:"#5D4037"}}>{year}年 {month+1}月</span>
    <button onClick={onNext} style={navBtn}>▶</button>
  </div>);
}

function WeekNav({selectedDate,onDateChange}){
  const{start,end}=getWeekRange(selectedDate);
  const shift=(days)=>{const{y,m,d}=parseDk(start);const n=new Date(y,m,d+days);onDateChange(dk(n.getFullYear(),n.getMonth(),n.getDate()));};
  return(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 8px",marginBottom:4}}>
    <button onClick={()=>shift(-7)} style={navBtn}>◀</button>
    <span style={{fontFamily:font,fontWeight:700,fontSize:15,color:"#5D4037"}}>{dateLabel(start)} 〜 {dateLabel(end)}</span>
    <button onClick={()=>shift(7)} style={navBtn}>▶</button>
  </div>);
}

function CalendarGrid({year,month,meals,selectedDate,onSelectDate}){
  const dim=getDIM(year,month);const fdow=getFDow(year,month);const today=todayKey();
  const cells=[];for(let i=0;i<fdow;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4,padding:"0 4px"}}>
      {DAYS_JP.map((d,i)=>(<div key={d} style={{textAlign:"center",fontSize:11,fontWeight:600,padding:"4px 0",color:i===0?"#E57373":i===6?"#64B5F6":"#8D7B6A",fontFamily:font}}>{d}</div>))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,padding:"0 4px"}}>
      {cells.map((d,i)=>{
        if(d===null)return<div key={`e${i}`}/>;
        const key=dk(year,month,d);const isToday=key===today;const isSel=key===selectedDate;
        const hasAny=meals[key]&&Object.values(meals[key]).some(arr=>Array.isArray(arr)&&arr.length>0);
        const dow=(fdow+d-1)%7;
        return(<button key={key} onClick={()=>onSelectDate(key)} style={{aspectRatio:"1",border:isSel?"2px solid #FF8A65":"2px solid transparent",borderRadius:12,background:isSel?"#FFF3E0":isToday?"#FFFDE7":"#FAFAF5",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:2,transition:"all 0.15s"}}>
          <span style={{fontSize:13,fontWeight:isToday?800:500,color:dow===0?"#E57373":dow===6?"#64B5F6":"#5D4037",fontFamily:font}}>{d}</span>
          {hasAny&&<div style={{width:6,height:6,borderRadius:"50%",background:"#FF8A65",marginTop:1}}/>}
        </button>);
      })}
    </div>
  </div>);
}

function CookingView({meals,selectedDate,noFreezeList}){
  const{start,end}=getWeekRange(selectedDate);const weekDates=datesInRange(start,end);const noFreeze=new Set(noFreezeList);
  const weeklyFoodUsage={};
  weekDates.forEach(d=>{const dd=meals[d];if(!dd)return;Object.values(dd).forEach(arr=>{if(!Array.isArray(arr))return;
    const dayAgg={};arr.forEach(item=>{dayAgg[item.food]=(dayAgg[item.food]||0)+item.amount;
      if(!weeklyFoodUsage[item.food])weeklyFoodUsage[item.food]=[];});
    Object.entries(dayAgg).forEach(([food,total])=>{
      if(!weeklyFoodUsage[food])weeklyFoodUsage[food]=[];
      const existing=weeklyFoodUsage[food].find(u=>u.date===d);
      if(existing)existing.amount+=total;
      else weeklyFoodUsage[food].push({date:d,amount:total,unit:UNIT_DEFAULTS[food]||"小さじ"});
    });
  });});

  const frozenPrep={};const freshDaily={};
  Object.entries(weeklyFoodUsage).forEach(([food,usages])=>{
    if(noFreeze.has(food)){usages.forEach(({date,amount,unit})=>{if(!freshDaily[date])freshDaily[date]={};freshDaily[date][food]={unit,amount};});}
    else{const first=usages[0].date;const prep=prevDay(first);if(!frozenPrep[prep])frozenPrep[prep]={};
      frozenPrep[prep][food]={unit:usages[0].unit,total:usages.reduce((s,u)=>s+u.amount,0),usages};}
  });

  const allDates=new Set([...Object.keys(frozenPrep),...Object.keys(freshDaily)]);const schedule=[...allDates].sort();
  return(<div style={{padding:"8px 0"}}>
    <div style={{textAlign:"center",marginBottom:12}}><div style={{fontFamily:font,fontSize:11,color:"#BFAE9A"}}>献立から自動計算 ・ 🧊冷凍=前日準備 🔥当日=冷凍しない食材</div></div>
    {schedule.length===0?(<div style={{textAlign:"center",padding:40,color:"#BFAE9A"}}><div style={{fontSize:40,marginBottom:8}}>🍳</div><div style={{fontFamily:font,fontSize:14}}>この週の献立を登録すると自動計算されます</div></div>):(
      schedule.map(d=>{const frozen=frozenPrep[d]||{};const fresh=freshDaily[d]||{};const hf=Object.keys(frozen).length>0;const hr=Object.keys(fresh).length>0;
        return(<div key={d} style={{background:"#FFF8F0",borderRadius:14,padding:"12px 14px",marginBottom:8,boxShadow:"0 1px 3px rgba(93,64,55,0.06)"}}>
          <div style={{fontFamily:font,fontWeight:700,fontSize:14,color:"#5D4037",marginBottom:8}}>📅 {dateLabelFull(d)}</div>
          {hf&&(<div style={{marginBottom:hr?10:0}}><div style={{fontSize:11,fontWeight:700,color:"#1565C0",marginBottom:6,fontFamily:font}}>🧊 冷凍ストック作り</div>
            {Object.entries(frozen).map(([food,{unit,total,usages}])=>{
              const counts={};usages.forEach(u=>{counts[u.amount]=(counts[u.amount]||0)+1;});
              const bd=Object.entries(counts).sort((a,b)=>+a[0]-+b[0]).map(([a,c])=>unit==="g"?`${a}g×${c}`:`小${a}×${c}`).join("、");
              return(<div key={food} style={{padding:"6px 10px",background:"#E3F2FD",borderRadius:10,marginBottom:4}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontFamily:font,fontWeight:600,fontSize:13,color:"#1565C0"}}>{foodEmoji(food)} {food}</span>
                  <span style={{fontFamily:font,fontWeight:800,fontSize:13,color:"#0D47A1"}}>合計 {total}{unit}</span>
                </div><div style={{fontFamily:font,fontSize:11,color:"#5D4037",marginTop:2}}>{bd}</div>
              </div>);})}
          </div>)}
          {hr&&(<div><div style={{fontSize:11,fontWeight:700,color:"#E65100",marginBottom:6,fontFamily:font}}>🔥 当日調理</div>
            {Object.entries(fresh).map(([food,{unit,amount}])=>(<div key={food} style={{padding:"6px 10px",background:"#FFF3E0",borderRadius:10,marginBottom:4}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontFamily:font,fontWeight:600,fontSize:13,color:"#E65100"}}>{foodEmoji(food)} {food}</span>
                <span style={{fontFamily:font,fontWeight:800,fontSize:13,color:"#BF360C"}}>{amount}{unit}</span>
              </div></div>))}
          </div>)}
        </div>);})
    )}
  </div>);
}

function App(){
  const now=new Date();
  const[year,setYear]=React.useState(now.getFullYear());
  const[month,setMonth]=React.useState(now.getMonth());
  const[tab,setTab]=React.useState("calendar");
  const[selectedDate,setSelectedDate]=React.useState(todayKey());
  const[meals,setMeals]=React.useState({});
  const[allergies,setAllergies]=React.useState({});
  const[birthday,setBirthday]=React.useState(null);
  const[mealCount,setMealCount]=React.useState(1);
  const[noFreezeList,setNoFreezeList]=React.useState(DEFAULT_NO_FREEZE);
  const[loading,setLoading]=React.useState(true);

  React.useEffect(()=>{
    const unsubs=[];
    // Listen to meals
    unsubs.push(fbListen("meals",val=>{
      if(val){setMeals(val);}
      else{setMeals(SEED_MEALS);fbSave("meals",SEED_MEALS);}
      setLoading(false);
    }));
    unsubs.push(fbListen("allergies",val=>{if(val)setAllergies(val);}));
    unsubs.push(fbListen("settings",val=>{
      if(val){
        if(val.birthday)setBirthday(val.birthday);
        if(val.mealCount)setMealCount(val.mealCount);
        if(val.noFreezeList)setNoFreezeList(val.noFreezeList);
      }
    }));
    return()=>unsubs.forEach(fn=>fn&&fn());
  },[]);

  const saveMeals=(date,dayData,dayMeta)=>{
    const updated={...meals};
    const hasItems=dayData&&Object.values(dayData).some(arr=>Array.isArray(arr)&&arr.length>0);
    if(hasItems)updated[date]=dayData;else delete updated[date];
    if(dayMeta&&Object.keys(dayMeta).length>0)updated[`${date}_meta`]=dayMeta;else delete updated[`${date}_meta`];
    setMeals(updated);fbSave("meals",updated);
  };
  const saveAllergy=(food,info)=>{const updated={...allergies,[food]:info};setAllergies(updated);fbSave("allergies",updated);};
  const saveSettings=(s)=>fbSave("settings",s);

  const monthAge=calcMonthAge(birthday);
  const prevMonth=()=>{if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1);};
  const nextMonth=()=>{if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);};

  if(loading)return(<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#FFF8F0",fontFamily:font,color:"#8D7B6A"}}><div style={{textAlign:"center"}}><div style={{fontSize:40,marginBottom:8}}>🍼</div>読み込み中...</div></div>);

  return(<div>
    <div style={{background:"linear-gradient(135deg,#FF8A65 0%,#FFB74D 100%)",padding:"16px 20px 12px",color:"#FFF",borderRadius:"0 0 24px 24px",boxShadow:"0 4px 16px rgba(255,138,101,0.25)"}}>
      <div style={{fontSize:20,fontWeight:700,letterSpacing:1}}>🍼 もぐもぐダイアリー</div>
      <div style={{fontSize:11,opacity:0.9,marginTop:3,display:"flex",gap:8,flexWrap:"wrap"}}>
        {monthAge!==null&&<span>👶 生後{monthAge}ヶ月</span>}
        {monthAge!==null&&<span>・ {getStageLabel(monthAge)}</span>}
        <span>・ {mealCount}回食</span>
        {IS_FIREBASE_CONFIGURED&&<span>・ 🔄同期中</span>}
      </div>
    </div>
    <div style={{padding:"12px 16px 100px"}}>
      <TabBar active={tab} onChange={setTab}/>
      {tab==="calendar"&&(<><MonthNav year={year} month={month} onPrev={prevMonth} onNext={nextMonth}/><CalendarGrid year={year} month={month} meals={meals} selectedDate={selectedDate} onSelectDate={setSelectedDate}/><MealEditor date={selectedDate} meals={meals} onSave={saveMeals} allergies={allergies} mealCount={mealCount}/></>)}
      {tab==="cooking"&&(<><WeekNav selectedDate={selectedDate} onDateChange={setSelectedDate}/><CookingView meals={meals} selectedDate={selectedDate} noFreezeList={noFreezeList}/></>)}
      {tab==="shopping"&&(<><WeekNav selectedDate={selectedDate} onDateChange={setSelectedDate}/><ShoppingView meals={meals} selectedDate={selectedDate}/></>)}
      {tab==="allergy"&&(<div style={{marginTop:12}}><AllergyView allergies={allergies} onUpdate={saveAllergy}/></div>)}
      {tab==="settings"&&(<div style={{marginTop:12}}><SettingsView birthday={birthday} setBirthday={setBirthday} mealCount={mealCount} setMealCount={setMealCount} noFreezeList={noFreezeList} setNoFreezeList={setNoFreezeList} onSaveSettings={saveSettings}/></div>)}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
