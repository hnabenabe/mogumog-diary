function dk(y,m,d){return`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;}
function parseDk(s){const p=s.split("-");return{y:+p[0],m:+p[1]-1,d:+p[2]};}
function todayKey(){const t=new Date();return dk(t.getFullYear(),t.getMonth(),t.getDate());}
function getDIM(y,m){return new Date(y,m+1,0).getDate();}
function getFDow(y,m){return new Date(y,m,1).getDay();}
function getDow(s){const{y,m,d}=parseDk(s);return new Date(y,m,d).getDay();}
function dateLabel(s){const{m,d}=parseDk(s);return`${m+1}/${d}`;}
function dateLabelFull(s){return`${dateLabel(s)}(${DAYS_JP[getDow(s)]})`;}
function getWeekRange(ds){const{y,m,d}=parseDk(ds);const date=new Date(y,m,d);const dow=date.getDay();const diff=dow===0?-6:1-dow;const mon=new Date(y,m,d+diff);const sun=new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+6);return{start:dk(mon.getFullYear(),mon.getMonth(),mon.getDate()),end:dk(sun.getFullYear(),sun.getMonth(),sun.getDate())};}
function datesInRange(s,e){const dates=[];const o=parseDk(s);let cur=new Date(o.y,o.m,o.d);const oe=parseDk(e);const end=new Date(oe.y,oe.m,oe.d);while(cur<=end){dates.push(dk(cur.getFullYear(),cur.getMonth(),cur.getDate()));cur=new Date(cur.getFullYear(),cur.getMonth(),cur.getDate()+1);}return dates;}
function calcMonthAge(b){if(!b)return null;const bd=new Date(b);const now=new Date();let mo=(now.getFullYear()-bd.getFullYear())*12+(now.getMonth()-bd.getMonth());if(now.getDate()<bd.getDate())mo--;return Math.max(0,mo);}

function CalendarGrid({year,month,meals,selectedDate,onSelectDate}){const dim=getDIM(year,month);const fdow=getFDow(year,month);const today=todayKey();const cells=[];for(let i=0;i<fdow;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);return(<div><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4,padding:"0 4px"}}>{DAYS_JP.map((d,i)=>(<div key={d} style={{textAlign:"center",fontSize:11,fontWeight:600,padding:"4px 0",color:i===0?"#E57373":i===6?"#64B5F6":"#8D7B6A",fontFamily:font}}>{d}</div>))}</div><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,padding:"0 4px"}}>{cells.map((d,i)=>{if(d===null)return<div key={`e${i}`}/>;const key=dk(year,month,d);const isToday=key===today;const isSel=key===selectedDate;const hasAny=meals[key]&&Object.values(meals[key]).some(a=>Array.isArray(a)&&a.length>0);const dow=(fdow+d-1)%7;return(<button key={key} onClick={()=>onSelectDate(key)} style={{aspectRatio:"1",border:isSel?"2px solid #FF8A65":"2px solid transparent",borderRadius:12,background:isSel?"#FFF3E0":isToday?"#FFFDE7":"#FAFAF5",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:2}}><span style={{fontSize:13,fontWeight:isToday?800:500,color:dow===0?"#E57373":dow===6?"#64B5F6":"#5D4037",fontFamily:font}}>{d}</span>{hasAny&&<div style={{width:6,height:6,borderRadius:"50%",background:"#FF8A65",marginTop:1}}/>}</button>);})}</div></div>);}

function MealEditor({date,meals,onSave,allergies,mealCount,allFoods}){
  const labels=MEAL_LABELS[mealCount]||["ごはん"];const dayData=meals[date]||{};const dayMeta=meals[`${date}_meta`]||{};
  const[em,setEm]=React.useState(null);const[items,setItems]=React.useState([]);const[sp,setSp]=React.useState(false);const[ac,setAc]=React.useState(Object.keys(allFoods)[0]);const[rx,setRx]=React.useState("");const[ea,setEa]=React.useState("ふつう");
  const ng=Object.keys(allergies).filter(f=>allergies[f]?.status==="NG");
  const startEdit=(mt)=>{const ex=Array.isArray(dayData[mt])?dayData[mt]:[];const meta=dayMeta[mt]||{};setItems(ex.map(i=>({...i})));setRx(meta.reaction||"");setEa(meta.amount||"ふつう");setEm(mt);setSp(false);};
  const addFood=(f)=>{if(items.find(i=>i.food===f))return;setItems([...items,{food:f,amount:getUD(f)==="g"?6:1,unit:getUD(f),isNew:false,mixed:false}]);setSp(false);};
  const ui=(idx,field,val)=>{const n=[...items];n[idx]={...n[idx],[field]:val};setItems(n);};
  const ri=(idx)=>setItems(items.filter((_,i)=>i!==idx));
  const save=()=>{onSave(date,{...dayData,[em]:items},{...dayMeta,[em]:{reaction:rx,amount:ea}});setEm(null);};
  const clear=()=>{const ud={...dayData};delete ud[em];const um={...dayMeta};delete um[em];onSave(date,ud,um);setEm(null);};

  const monthAge=calcMonthAge(birthday);const allList=Object.values(allFoods).flat();const cats=Object.keys(allFoods);
  const[nfn,setNfn]=React.useState("");const[nfc,setNfc]=React.useState("野菜");
  const addNF=(f)=>{if(!noFreezeList.includes(f)){const u=[...noFreezeList,f];setNoFreezeList(u);onSaveSettings({birthday,mealCount,noFreezeList:u,customFoods});}};
  const removeNF=(f)=>{const u=noFreezeList.filter(x=>x!==f);setNoFreezeList(u);onSaveSettings({birthday,mealCount,noFreezeList:u,customFoods});};
  const addCF=()=>{const name=nfn.trim();if(!name||allList.includes(name))return;const u={...customFoods};if(!u[nfc])u[nfc]=[];u[nfc].push(name);setCustomFoods(u);setNfn("");onSaveSettings({birthday,mealCount,noFreezeList,customFoods:u});};
  const removeCF=(cat,food)=>{const u={...customFoods};if(u[cat])u[cat]=u[cat].filter(f=>f!==food);if(u[cat]&&u[cat].length===0)delete u[cat];setCustomFoods(u);onSaveSettings({birthday,mealCount,noFreezeList,customFoods:u});};
  const cfList=Object.entries(customFoods||{}).flatMap(([cat,foods])=>foods.map(f=>({food:f,cat})));
  return(<div style={{padding:"12px 0"}}>
    <div style={{background:"#FFF8F0",borderRadius:14,padding:"14px",marginBottom:12}}><label style={{...labelSt,fontSize:14}}>🎂 お子さんの誕生日</label><input type="date" value={birthday||""} onChange={e=>{setBirthday(e.target.value);onSaveSettings({birthday:e.target.value,mealCount,noFreezeList,customFoods});}} style={{width:"100%",border:"2px solid #F0E6D3",borderRadius:12,padding:"10px 12px",fontSize:15,fontFamily:font,color:"#5D4037",background:"#FAFAF5",boxSizing:"border-box",outline:"none"}}/>{monthAge!==null&&(<div style={{marginTop:8,fontFamily:font,fontSize:14,color:"#E65100",fontWeight:700,textAlign:"center"}}>🍼 生後 {monthAge}ヶ月 ・ {getStageLabel(monthAge)}</div>)}</div>
    <div style={{background:"#FFF8F0",borderRadius:14,padding:"14px",marginBottom:12}}><label style={{...labelSt,fontSize:14}}>🍽️ 回数</label><div style={{display:"flex",gap:8}}>{[1,2,3].map(n=>(<button key={n} onClick={()=>{setMealCount(n);onSaveSettings({birthday,mealCount:n,noFreezeList,customFoods});}} style={{...pill(mealCount===n),flex:1,padding:"12px",fontSize:15}}>{n}回食</button>))}</div></div>
    <div style={{background:"#FFF8F0",borderRadius:14,padding:"14px",marginBottom:12}}><label style={{...labelSt,fontSize:14}}>🥄 食材を追加</label><div style={{display:"flex",gap:4,marginBottom:8}}><input value={nfn} onChange={e=>setNfn(e.target.value)} placeholder="食材名" style={{flex:1,border:"2px solid #F0E6D3",borderRadius:10,padding:"8px 10px",fontSize:13,fontFamily:font,color:"#5D4037",background:"#FAFAF5",outline:"none"}}/><select value={nfc} onChange={e=>setNfc(e.target.value)} style={{border:"2px solid #F0E6D3",borderRadius:10,padding:"8px 6px",fontSize:12,fontFamily:font,color:"#5D4037",background:"#FAFAF5",outline:"none"}}>{cats.map(c=>(<option key={c} value={c}>{c}</option>))}</select><button onClick={addCF} style={{...pill(true),padding:"8px 14px"}}>追加</button></div>{cfList.length>0&&(<div><div style={{fontSize:11,color:"#8D7B6A",marginBottom:4,fontFamily:font}}>追加済み:</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{cfList.map(({food,cat})=>(<span key={food} style={{fontSize:12,background:"#E8F5E9",color:"#2E7D32",borderRadius:12,padding:"4px 10px",fontFamily:font,display:"flex",alignItems:"center",gap:4}}>{foodEmoji(food)} {food}({cat})<button onClick={()=>removeCF(cat,food)} style={{width:16,height:16,borderRadius:4,border:"none",background:"#FFCDD2",color:"#C62828",fontSize:9,cursor:"pointer"}}>✕</button></span>))}</div></div>)}</div>
    <div style={{background:"#FFF8F0",borderRadius:14,padding:"14px",marginBottom:12}}><label style={{...labelSt,fontSize:14}}>🔥 冷凍しない食材（当日調理）</label><div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>{noFreezeList.map(f=>(<span key={f} style={{fontSize:13,background:"#FFF3E0",color:"#E65100",borderRadius:14,padding:"6px 12px",fontFamily:font,fontWeight:500,display:"flex",alignItems:"center",gap:4}}>{foodEmoji(f)} {f}<button onClick={()=>removeNF(f)} style={{width:18,height:18,borderRadius:4,border:"none",background:"#FFCDD2",color:"#C62828",fontSize:10,cursor:"pointer"}}>✕</button></span>))}{noFreezeList.length===0&&<span style={{fontFamily:font,fontSize:12,color:"#BFAE9A"}}>なし</span>}</div><div style={{fontSize:12,fontWeight:700,color:"#8D7B6A",marginBottom:6,fontFamily:font}}>追加する食材を選択：</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{allList.filter(f=>!noFreezeList.includes(f)).map(f=>(<button key={f} onClick={()=>addNF(f)} style={{padding:"4px 10px",borderRadius:12,border:"none",background:"#F5EDE3",color:"#5D4037",fontSize:11,cursor:"pointer",fontFamily:font}}>{foodEmoji(f)} {f}</button>))}</div></div>
    {IS_FB?(<div style={{background:"#E8F5E9",borderRadius:14,padding:"14px"}}><div style={{fontFamily:font,fontWeight:700,fontSize:14,color:"#2E7D32"}}>✅ リアルタイム同期ON</div><div style={{fontFamily:font,fontSize:12,color:"#5D4037"}}>2人のデータはリアルタイムで同期されます。</div></div>):(<div style={{background:"#FFF3E0",borderRadius:14,padding:"14px"}}><div style={{fontFamily:font,fontWeight:700,fontSize:14,color:"#E65100"}}>⚠️ オフラインモード</div></div>)}
  </div>);
}

function App(){
  const now=new Date();const[year,setYear]=React.useState(now.getFullYear());const[month,setMonth]=React.useState(now.getMonth());
  const[tab,setTab]=React.useState("calendar");const[sd,setSd]=React.useState(todayKey());
  const[meals,setMeals]=React.useState({});const[allergies,setAllergies]=React.useState({});const[cookingData,setCookingData]=React.useState({});
  const[birthday,setBirthday]=React.useState(null);const[mealCount,setMealCount]=React.useState(1);const[noFreezeList,setNoFreezeList]=React.useState(DEFAULT_NO_FREEZE);const[customFoods,setCustomFoods]=React.useState({});const[loading,setLoading]=React.useState(true);
  const allFoods=React.useMemo(()=>getAllFoods(customFoods),[customFoods]);
  React.useEffect(()=>{const u=[];u.push(fbListen("meals",v=>{if(v)setMeals(v);else{setMeals(SEED_MEALS);fbSave("meals",SEED_MEALS);}setLoading(false);}));u.push(fbListen("allergies",v=>{if(v)setAllergies(v);}));u.push(fbListen("cooking",v=>{if(v)setCookingData(v);}));u.push(fbListen("settings",v=>{if(v){if(v.birthday)setBirthday(v.birthday);if(v.mealCount)setMealCount(v.mealCount);if(v.noFreezeList)setNoFreezeList(v.noFreezeList);if(v.customFoods)setCustomFoods(v.customFoods);}}));return()=>u.forEach(fn=>fn&&fn());},[]);
  const saveMeals=(date,dd,dm)=>{const u={...meals};const has=dd&&Object.values(dd).some(a=>Array.isArray(a)&&a.length>0);if(has)u[date]=dd;else delete u[date];if(dm&&Object.keys(dm).length>0)u[`${date}_meta`]=dm;else delete u[`${date}_meta`];setMeals(u);fbSave("meals",u);};
  const saveAllergy=(f,info)=>{const u={...allergies,[f]:info};setAllergies(u);fbSave("allergies",u);};
  const saveCooking=(wk,data)=>{const u={...cookingData};if(data===null)delete u[wk];else u[wk]=data;setCookingData(u);fbSave("cooking",u);};
  const saveSettings=(s)=>fbSave("settings",s);
  const monthAge=calcMonthAge(birthday);
  const prevMonth=()=>{if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1);};
  const nextMonth=()=>{if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);};
  if(loading)return(<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#FFF8F0",fontFamily:font,color:"#8D7B6A"}}><div style={{textAlign:"center"}}><div style={{fontSize:40,marginBottom:8}}>🍼</div>読み込み中...</div></div>);
  return(<div><div style={{background:"linear-gradient(135deg,#FF8A65 0%,#FFB74D 100%)",padding:"16px 20px 12px",color:"#FFF",borderRadius:"0 0 24px 24px",boxShadow:"0 4px 16px rgba(255,138,101,0.25)"}}><div style={{fontSize:20,fontWeight:700,letterSpacing:1}}>🍼 もぐもぐダイアリー</div><div style={{fontSize:11,opacity:0.9,marginTop:3,display:"flex",gap:8,flexWrap:"wrap"}}>{monthAge!==null&&<span>👶 生後{monthAge}ヶ月</span>}{monthAge!==null&&<span>・ {getStageLabel(monthAge)}</span>}<span>・ {mealCount}回食</span>{IS_FB&&<span>・ 🔄同期中</span>}</div></div>
    <div style={{padding:"12px 16px 100px"}}><TabBar active={tab} onChange={setTab}/>
      {tab==="calendar"&&(<><MonthNav year={year} month={month} onPrev={prevMonth} onNext={nextMonth}/><CalendarGrid year={year} month={month} meals={meals} selectedDate={sd} onSelectDate={setSd}/><MealEditor date={sd} meals={meals} onSave={saveMeals} allergies={allergies} mealCount={mealCount} allFoods={allFoods}/></>)}
      {tab==="cooking"&&(<><WeekNav selectedDate={sd} onDateChange={setSd}/><CookingView meals={meals} selectedDate={sd} noFreezeList={noFreezeList} allFoods={allFoods} cookingData={cookingData} onSaveCooking={saveCooking}/></>)}
      {tab==="shopping"&&(<><WeekNav selectedDate={sd} onDateChange={setSd}/><ShoppingView meals={meals} selectedDate={sd} allFoods={allFoods}/></>)}
      {tab==="allergy"&&(<div style={{marginTop:12}}><AllergyView allergies={allergies} onUpdate={saveAllergy} allFoods={allFoods}/></div>)}
      {tab==="settings"&&(<div style={{marginTop:12}}><SettingsView birthday={birthday} setBirthday={setBirthday} mealCount={mealCount} setMealCount={setMealCount} noFreezeList={noFreezeList} setNoFreezeList={setNoFreezeList} customFoods={customFoods} setCustomFoods={setCustomFoods} onSaveSettings={saveSettings} allFoods={allFoods}/></div>)}
    </div></div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
